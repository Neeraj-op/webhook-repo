services:
  - type: web
    name: webhook-receiver
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn -w 4 -b 0.0.0.0:$PORT run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        fromService:
          name: webhook-receiver
          property: port